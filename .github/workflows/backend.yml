name: Backend

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kadince
          POSTGRES_PASSWORD: password
          POSTGRES_DB: kadince_task_list_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U kadince"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          working-directory: backend
          bundler-cache: true

      - name: Lint (RuboCop)
        run: bin/rubocop

      - name: Security scan (Brakeman)
        run: bin/brakeman --quiet --no-pager --exit-on-warn --exit-on-error

      - name: Tests
        run: bin/rails db:test:prepare test
