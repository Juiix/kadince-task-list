# Render Blueprint — deploys the full stack from this repo.
# https://render.com/docs/blueprint-spec
#
# One-time setup after clicking "New > Blueprint" in Render:
#   - set RAILS_MASTER_KEY on the API service (value of backend/config/master.key)

databases:
  - name: kadince-task-list-db
    plan: free
    databaseName: kadince_task_list_production
    user: kadince

services:
  # Rails GraphQL API (Docker, served by Thruster/Puma)
  - type: web
    name: kadince-task-list-api
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kadince-task-list-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://kadince-task-list.onrender.com
      - key: HTTP_PORT # Thruster listens where Render routes traffic
        value: "10000"

  # React SPA (static build served by Render's CDN)
  - type: web
    name: kadince-task-list
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_GRAPHQL_URL
        value: https://kadince-task-list-api.onrender.com/graphql
    routes:
      # SPA fallback: let react-router handle client-side paths like /tasks
      - type: rewrite
        source: /*
        destination: /index.html
